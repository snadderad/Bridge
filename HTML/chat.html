<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Berichten</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.chat-list { padding: 16px; max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }

.chat-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: background 0.15s;
    opacity: 0;
    animation: slideIn 0.35s ease forwards;
}

.chat-item:active { background: var(--accent2); }

.chat-avatar {
    width: 50px; height: 50px;
    border-radius: 50%;
    background: var(--accent2);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--accent);
    font-weight: 700;
    flex-shrink: 0;
    overflow: hidden;
}

.chat-avatar img { width: 100%; height: 100%; object-fit: cover; }

.chat-info { flex: 1; min-width: 0; }

.chat-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
}

.chat-preview {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-weight: 300;
}

.chat-time {
    font-size: 0.75rem;
    color: var(--muted);
    flex-shrink: 0;
}

.chat-item:nth-child(1) { animation-delay: 0.05s; }
.chat-item:nth-child(2) { animation-delay: 0.1s; }
.chat-item:nth-child(3) { animation-delay: 0.15s; }
.chat-item:nth-child(4) { animation-delay: 0.2s; }
.chat-item:nth-child(5) { animation-delay: 0.25s; }
</style>
</head>
<body>

<div class="header">
  <h1>Bericht<span>en</span></h1>
</div>

<div id="chatList" class="chat-list">
  <div class="state-msg">
    <div class="spinner"></div>
    Berichten laden…
  </div>
</div>

<script>
  const API_BASE = "https://api.snadex.nl";
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token') || '';

  function getInitials(name) {
    return (name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }

  function timeAgo(dateStr) {
    if (!dateStr) return '';
    const diff = Date.now() - new Date(dateStr).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 1) return 'Nu';
    if (m < 60) return `${m}m`;
    const h = Math.floor(m / 60);
    if (h < 24) return `${h}u`;
    return `${Math.floor(h / 24)}d`;
  }

  async function loadChats() {
    try {
      const res = await fetch(`${API_BASE}/chat`, {
        headers: { 'Authorization': token }
      });
      if (!res.ok) throw new Error('Unauthorized');
      const chats = await res.json();

      const list = document.getElementById('chatList');

      if (!chats.length) {
        list.innerHTML = `<div class="state-msg"><div class="icon">💬</div>Nog geen berichten.<br><small>Verbind met mensen via de feed!</small></div>`;
        return;
      }

      list.innerHTML = '';
      chats.forEach((chat, i) => {
        const item = document.createElement('div');
        item.className = 'chat-item';
        item.style.animationDelay = `${i * 0.05}s`;

        const avatarHTML = chat.profile_pic
          ? `<img src="${chat.profile_pic}" onerror="this.style.display='none'" alt="">`
          : getInitials(chat.name);

        item.innerHTML = `
          <div class="chat-avatar">${chat.profile_pic ? `<img src="${chat.profile_pic}" onerror="this.outerHTML='${getInitials(chat.name)}'">` : getInitials(chat.name)}</div>
          <div class="chat-info">
            <div class="chat-name">${chat.name || 'Onbekend'}</div>
            <div class="chat-preview">${chat.last_message || 'Stuur een bericht…'}</div>
          </div>
          <div class="chat-time">${timeAgo(chat.last_time)}</div>
        `;

        item.onclick = () => {
          window.location.href = `${API_BASE}/chat/${chat.user_id}?token=${token}`;
        };

        list.appendChild(item);
      });

    } catch (err) {
      document.getElementById('chatList').innerHTML = `
        <div class="state-msg"><div class="icon">⚠️</div>Kon berichten niet laden.</div>`;
    }
  }

  loadChats();
</script>
</body>
</html>

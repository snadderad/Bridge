<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Profiel bewerken</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  /* ── Form sections ── */
  .form-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.4s ease forwards;
  }
  .form-section:nth-child(1) { animation-delay: 0.05s; }
  .form-section:nth-child(2) { animation-delay: 0.12s; }
  .form-section:nth-child(3) { animation-delay: 0.19s; }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  .form-section-label {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 15px 16px 0;
  }
  .form-section-icon {
    width: 28px; height: 28px;
    background: var(--accent2);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .form-section-icon svg {
    width: 14px; height: 14px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .form-section-title {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.9px;
  }

  /* ── Inputs ── */
  .field {
    padding: 10px 16px 16px;
  }
  .field label {
    display: block;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .field input,
  .field textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .field input:focus,
  .field textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.1);
  }
  .field textarea {
    resize: none;
    height: 100px;
    line-height: 1.55;
  }
  .field-row {
    display: flex;
    gap: 10px;
  }
  .field-row .field {
    flex: 1;
    padding: 10px 0 16px;
  }
  .field-row .field:first-child { padding-left: 16px; }
  .field-row .field:last-child  { padding-right: 16px; }

  /* ── Avatar picker ── */
  .avatar-picker {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 20px;
    gap: 14px;
  }
  .avatar-preview {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: var(--accent2);
    border: 3px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--accent);
    font-weight: 700;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    position: relative;
  }
  .avatar-preview img {
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .btn-avatar {
    background: transparent;
    color: var(--accent);
    border: 1.5px solid var(--accent);
    border-radius: 20px;
    padding: 8px 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-avatar:active { background: var(--accent); color: #fff; }
  #avatarInput { display: none; }

  /* ── Interests grid ── */
  .interests-grid {
    padding: 10px 16px 18px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .interest-option {
    background: var(--bg);
    color: var(--muted);
    font-size: 0.78rem;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.18s ease;
    user-select: none;
    -webkit-user-select: none;
  }
  .interest-option.selected {
    background: var(--accent2);
    color: #5a4020;
    border-color: #d4b88a;
  }
  .interest-option:active { transform: scale(0.95); }

  /* ── Save button ── */
  .save-wrap {
    padding: 0 16px;
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.4s ease 0.26s forwards;
  }
  .btn-save {
    width: 100%;
    background: var(--connect);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 0;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    letter-spacing: 0.3px;
  }
  .btn-save:active { background: var(--connect-hover); transform: scale(0.98); }
  .btn-save:disabled { background: #a0b8a8; cursor: default; }
  .btn-save.loading { background: #a0b8a8; }

  /* ── Char counter ── */
  .char-count {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: right;
    margin-top: 5px;
  }
  .char-count.over { color: var(--accent); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1a1208;
    color: #fff;
    padding: 10px 22px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 500;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
    z-index: 200;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .toast.error { background: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <h1>Profiel <span>bewerken</span></h1>
</div>

<div id="main" style="display:none">
  <div class="container" style="padding-top: 16px;">

    <!-- Avatar -->
    <div class="form-section">
      <div class="form-section-label">
        <div class="form-section-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </div>
        <div class="form-section-title">Profielfoto</div>
      </div>
      <div class="avatar-picker">
        <div class="avatar-preview" id="avatarPreview">?</div>
        <button class="btn-avatar" onclick="document.getElementById('avatarInput').click()">Foto wijzigen</button>
        <input type="file" id="avatarInput" accept="image/*">
      </div>
    </div>

    <!-- Basisinformatie -->
    <div class="form-section">
      <div class="form-section-label">
        <div class="form-section-icon">
          <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </div>
        <div class="form-section-title">Basisgegevens</div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>Naam</label>
          <input type="text" id="inputName" placeholder="Jouw naam" maxlength="40">
        </div>
        <div class="field">
          <label>Leeftijd</label>
          <input type="number" id="inputAge" placeholder="—" min="1" max="120" style="width:100%">
        </div>
      </div>

      <div class="field" style="padding-top:0">
        <label>Bio <span id="bioCounter" class="char-count" style="float:right">0 / 200</span></label>
        <textarea id="inputBio" placeholder="Vertel iets over jezelf…" maxlength="200"></textarea>
      </div>
    </div>

    <!-- Interesses -->
    <div class="form-section">
      <div class="form-section-label">
        <div class="form-section-icon">
          <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <div class="form-section-title">Interesses</div>
      </div>
      <div class="interests-grid" id="interestsGrid"></div>
    </div>

    <!-- Opslaan -->
    <div class="save-wrap">
      <button class="btn-save" id="btnSave" onclick="saveProfile()">Opslaan</button>
    </div>

  </div>
</div>

<div id="loading" class="state-msg">
  <div class="spinner"></div>
  Profiel laden…
</div>

<div class="toast" id="toast"></div>

<script>
  const API_BASE = "https://api.snadex.nl";
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token') || '';

  const INTERESTS = [
    'Tuinieren', 'Fietsen', 'Koken', 'Lezen', 'Wandelen',
    'Fotografie', 'Muziek', 'Films', 'Reizen', 'Handwerk',
    'Kunst', 'Vrijwilligerswerk', 'Sport', 'Puzzels', 'Yoga',
    'Breien', 'Schilderen', 'Theater', 'Dans', 'Natuur'
  ];

  let selectedInterests = new Set();
  let avatarBase64 = null;

  function getInitials(name) {
    return (name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }

  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '') + ' show';
    setTimeout(() => t.className = 'toast' + (isError ? ' error' : ''), 2500);
  }


function buildInterests(current) {
  const grid = document.getElementById('interestsGrid');
  grid.innerHTML = '';
  const active = current ? current.split(',').map(i => i.trim()).filter(Boolean) : [];
  
  // Only keep predefined ones in selectedInterests
  active.forEach(i => {
    if (INTERESTS.includes(i)) selectedInterests.add(i);
  });

  INTERESTS.forEach(interest => {
    const chip = document.createElement('div');
    chip.className = 'interest-option' + (selectedInterests.has(interest) ? ' selected' : '');
    chip.textContent = interest;
    chip.onclick = () => {
      if (selectedInterests.has(interest)) {
        selectedInterests.delete(interest);
        chip.classList.remove('selected');
      } else {
        selectedInterests.add(interest);
        chip.classList.add('selected');
      }
    };
    grid.appendChild(chip);
  });
}

  // Bio character counter
  document.getElementById('inputBio').addEventListener('input', function() {
    const len = this.value.length;
    const counter = document.getElementById('bioCounter');
    counter.textContent = `${len} / 200`;
    counter.className = 'char-count' + (len >= 180 ? ' over' : '');
  });

  // Avatar file picker
  document.getElementById('avatarInput').addEventListener('change', function() {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      avatarBase64 = e.target.result;
      const preview = document.getElementById('avatarPreview');
      preview.innerHTML = `<img src="${avatarBase64}" alt="preview">`;
    };
    reader.readAsDataURL(file);
  });

  // Load existing profile
  async function loadProfile() {
    try {
      const res = await fetch(`${API_BASE}/profile`, {
        headers: { 'Authorization': token }
      });
      if (!res.ok) throw new Error();
      const user = await res.json();

      // Avatar preview
      const preview = document.getElementById('avatarPreview');
      if (user.profile_pic) {
        preview.innerHTML = `<img src="${user.profile_pic}" alt="avatar">`;
      } else {
        preview.textContent = getInitials(user.name);
      }

      document.getElementById('inputName').value = user.name || '';
      document.getElementById('inputAge').value = user.age || '';
      document.getElementById('inputBio').value = user.bio || '';
      const len = (user.bio || '').length;
      document.getElementById('bioCounter').textContent = `${len} / 200`;

      buildInterests(user.interests);

      document.getElementById('loading').style.display = 'none';
      document.getElementById('main').style.display = 'block';

    } catch {
      document.getElementById('loading').innerHTML = `
        <div class="icon">⚠️</div>
        Kon profiel niet laden.`;
    }
  }

  // Save
  async function saveProfile() {
    const btn = document.getElementById('btnSave');
    btn.disabled = true;
    btn.classList.add('loading');
    btn.textContent = 'Opslaan…';

    const body = {
      name: document.getElementById('inputName').value.trim(),
      age: parseInt(document.getElementById('inputAge').value) || null,
      bio: document.getElementById('inputBio').value.trim(),
      interests: [...selectedInterests].join(', '),
    };

    if (avatarBase64) body.profile_pic = avatarBase64;

    try {
      const res = await fetch(`${API_BASE}/profile/update`, {
        method: 'POST',
        headers: {
          'Authorization': token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });

      if (!res.ok) throw new Error();
      showToast('✓ Profiel opgeslagen');
      setTimeout(() => {
        window.location.href = `${API_BASE}/profile?token=${token}`;
      }, 1200);

    } catch {
      showToast('Opslaan mislukt. Probeer opnieuw.', true);
      btn.disabled = false;
      btn.classList.remove('loading');
      btn.textContent = 'Opslaan';
    }
  }

  loadProfile();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gesprek</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  * { box-sizing: border-box; }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    overflow: hidden;
  }

  /* ── Header ── */
  .conv-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .back-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 6px;
    color: var(--accent);
    font-size: 1.3rem;
    line-height: 1;
    border-radius: 8px;
    transition: background 0.15s;
  }
  .back-btn:active { background: var(--accent2); }

  .conv-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--accent2);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--accent);
    font-weight: 700;
    overflow: hidden;
    flex-shrink: 0;
  }
  .conv-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .conv-name {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1rem;
    color: var(--text);
  }

  /* ── Message list ── */
  #msgList {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scroll-behavior: smooth;
  }

  .bubble-row {
    display: flex;
    opacity: 0;
    animation: slideIn 0.25s ease forwards;
  }
  .bubble-row.mine  { justify-content: flex-end; }
  .bubble-row.theirs{ justify-content: flex-start; }

  .bubble {
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 0.88rem;
    line-height: 1.45;
    word-break: break-word;
  }

  .bubble-row.mine .bubble {
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
    font-weight: 400;
  }

  .bubble-row.theirs .bubble {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  .bubble-time {
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 3px;
    text-align: right;
  }
  .bubble-row.theirs .bubble-time { text-align: left; }

  .bubble-wrap { display: flex; flex-direction: column; }

  /* ── Composer ── */
  .composer {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 10px 16px 14px;
    background: var(--card);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #msgInput {
    flex: 1;
    resize: none;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 10px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    outline: none;
    max-height: 120px;
    line-height: 1.4;
    transition: border-color 0.15s;
  }
  #msgInput:focus { border-color: var(--accent); }
  #msgInput::placeholder { color: var(--muted); }

  #sendBtn {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }
  #sendBtn:disabled { opacity: 0.4; cursor: default; }
  #sendBtn:not(:disabled):active { transform: scale(0.92); }

  #sendBtn svg { width: 18px; height: 18px; fill: #fff; }

  /* ── States ── */
  .state-msg { text-align: center; color: var(--muted); font-size: 0.85rem; padding: 32px 16px; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="conv-header">
  <button class="back-btn" id="backBtn">&#8592;</button>
  <div class="conv-avatar" id="convAvatar"></div>
  <div class="conv-name" id="convName">…</div>
</div>

<div id="msgList">
  <div class="state-msg"><div class="spinner"></div>Berichten laden…</div>
</div>

<div class="composer">
  <textarea id="msgInput" rows="1" placeholder="Schrijf een bericht…"></textarea>
  <button id="sendBtn" disabled>
    <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
  </button>
</div>

<script>
  const API_BASE  = 'https://api.snadex.nl';
  const params    = new URLSearchParams(window.location.search);
  const token     = params.get('token') || '';

  // other_id lives in the URL path: /chat/view?other=42&token=…
  const otherId   = params.get('other') || '';

  let myId = null;
  let pollTimer = null;

  // ── helpers ──────────────────────────────────────────────────────────────

  function getInitials(name) {
    return (name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
  }

function fmtTime(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return d.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
}

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function scrollBottom() {
    const list = document.getElementById('msgList');
    list.scrollTop = list.scrollHeight;
  }

  // ── Render messages ───────────────────────────────────────────────────────

  function renderMessages(messages) {
    const list = document.getElementById('msgList');
    const wasAtBottom = list.scrollHeight - list.scrollTop - list.clientHeight < 80;

    // build a set of already-rendered ids
    const rendered = new Set(
      [...list.querySelectorAll('.bubble-row')].map(el => el.dataset.id)
    );

    messages.forEach((msg, i) => {
      const id = String(msg.id);
      if (rendered.has(id)) return;

      const mine = msg.sender_id === myId;
      const row = document.createElement('div');
      row.className = `bubble-row ${mine ? 'mine' : 'theirs'}`;
      row.dataset.id = id;
      row.style.animationDelay = rendered.size === 0 ? `${i * 0.03}s` : '0s';

      row.innerHTML = `
        <div class="bubble-wrap">
          <div class="bubble">${escapeHTML(msg.body)}</div>
          <div class="bubble-time">${fmtTime(msg.sent_at)}</div>
        </div>
      `;
      list.appendChild(row);
    });

    if (wasAtBottom || rendered.size === 0) scrollBottom();
  }

  function escapeHTML(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ── Load conversation ─────────────────────────────────────────────────────

  async function loadConversation(initial = false) {
    try {
      const res = await fetch(`${API_BASE}/chat/${otherId}`, {
        headers: { 'Authorization': token }
      });
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();

      myId = data.me;

      // Header
      const other = data.other;
      const avatarEl = document.getElementById('convAvatar');
      if (other.profile_pic) {
        avatarEl.innerHTML = `<img src="${other.profile_pic}" onerror="this.style.display='none'" alt="">`;
      } else {
        avatarEl.textContent = getInitials(other.name);
      }
      document.getElementById('convName').textContent = other.name || 'Onbekend';
      document.title = other.name || 'Gesprek';

      if (initial) {
        document.getElementById('msgList').innerHTML = '';
      }

      renderMessages(data.messages);
      document.getElementById('sendBtn').disabled = false;

    } catch (err) {
      if (initial) {
        document.getElementById('msgList').innerHTML =
          `<div class="state-msg">⚠️ Kon berichten niet laden.</div>`;
      }
    }
  }

  // ── Send message ──────────────────────────────────────────────────────────

  async function sendMessage() {
    const input = document.getElementById('msgInput');
    const body  = input.value.trim();
    if (!body) return;

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    input.value = '';
    autoResize(input);

    try {
      const res = await fetch(`${API_BASE}/chat/${otherId}`, {
        method:  'POST',
        headers: { 'Authorization': token, 'Content-Type': 'application/json' },
        body:    JSON.stringify({ body })
      });
      if (!res.ok) throw new Error(res.status);
      await loadConversation(false); // refresh to get the new message with its ID
    } catch {
      // re-put text on failure
      input.value = body;
      autoResize(input);
    } finally {
      btn.disabled = false;
      input.focus();
    }
  }

  // ── Events ────────────────────────────────────────────────────────────────

  document.getElementById('backBtn').onclick = () => {
    window.location.href = `${API_BASE}/chat/view?token=${token}`;
  };

  const input = document.getElementById('msgInput');
  input.addEventListener('input', () => {
    autoResize(input);
    document.getElementById('sendBtn').disabled = !input.value.trim();
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  document.getElementById('sendBtn').addEventListener('click', sendMessage);

  // ── Boot ──────────────────────────────────────────────────────────────────

  if (!otherId) {
    document.getElementById('msgList').innerHTML =
      `<div class="state-msg">⚠️ Geen gesprekspartner opgegeven.</div>`;
  } else {
    loadConversation(true);
    // poll every 5 s for new messages
    pollTimer = setInterval(() => loadConversation(false), 5000);
  }
</script>
</body>
</html>
